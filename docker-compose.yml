services:
  postgres:
    image: postgres:15-alpine
    container_name: films_postgres
    environment:
      POSTGRES_DB: prac
      POSTGRES_USER: prac
      POSTGRES_PASSWORD: prac
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - films_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prac"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: films_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - films_network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ghcr.io/an-sbl/film-react-nest-backend:latest
    container_name: films_backend
    environment:
      - NODE_ENV=production
      - DEBUG=*
      - DATABASE_DRIVER=postgres
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USERNAME=prac
      - DATABASE_PASSWORD=prac
      - DATABASE_NAME=prac
    ports:
      - "3000:3000"
    networks:
      - films_network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend-builder:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: films_frontend_builder
    environment:
      - VITE_API_URL=/api/afisha
      - VITE_CDN_URL=/content/afisha
    volumes:
      - frontend_dist:/app/dist
    command:  sh -c "npm run build && cp -r /app/dist/* /app/dist/ || true"

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    image: ghcr.io/an-sbl/film-react-nest-nginx:latest
    container_name: films_nginx
    ports:
      - "80:80"
    volumes:
      - frontend_dist:/usr/share/nginx/html
    networks:
      - films_network
    depends_on:
      - backend
      - frontend-builder
    restart: unless-stopped

networks:
  films_network:
    driver: bridge

volumes:
  postgres_data:
  pgadmin_data:
  frontend_dist:
version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: films_postgres
    environment:
      POSTGRES_DB: prac
      POSTGRES_USER: prac
      POSTGRES_PASSWORD: prac
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - films_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prac"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: films_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - films_network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  backend:
    image: ghcr.io/an-sbl/film-react-nest-backend:latest
    container_name: films_backend
    environment:
      - NODE_ENV=production
      - DEBUG=*
      - DATABASE_DRIVER=postgres
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USERNAME=prac
      - DATABASE_PASSWORD=prac
      - DATABASE_NAME=prac
    networks:
      - films_network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: ghcr.io/an-sbl/film-react-nest-nginx:latest
    container_name: films_nginx
    ports:
      - "80:80"
    networks:
      - films_network
    depends_on:
      - backend
    restart: unless-stopped

networks:
  films_network:
    driver: bridge

volumes:
  postgres_data:
  pgadmin_data: